<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>גמרא</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="blue">
  <header id="topbar">
    <div class="brand">גמרא</div>

    <div class="control">
      <label for="masechet">מסכת</label>
      <select id="masechet"></select>
    </div>

    <div class="control">
      <label for="daf">דף</label>
      <select id="daf"></select>
    </div>

    <div class="control">
      <label for="view">מבט</label>
      <select id="view">
        <option value="daf">צורת הדף</option>
        <option value="rif">רי״ף + נושאי כלים</option>
        <option value="rosh">פסקי הרא״ש</option>
        <option value="maharsha">מהרש״א</option>
      </select>
    </div>

    <div class="nav-buttons">
      <button id="prev" title="הדף הקודם">▶ הקודם</button>
      <button id="next" title="הדף הבא">הבא ◀</button>
    </div>

    <div class="control grow search-wrap">
      <label for="search">חיפוש · מקור · שאלה</label>
      <input id="search" type="text" autocomplete="off"
        placeholder="קידושין מא. · ברכות ב · או: איפה הסיפור על רבי עקיבא ואשתו?" />
      <div id="search-results" class="search-results hidden"></div>
    </div>

    <div class="actions">
      <button id="zoomOut" title="הקטן אותיות">א−</button>
      <button id="zoomIn" title="הגדל אותיות">א+</button>
      <button id="focusBtn" title="מיקוד: הדף על כל המסך">📖 מיקוד</button>
      <button id="readBtn" title="הקרא בקול (בחר טקסט או הקרא את הדף)">🔊 הקרא</button>
      <button id="voiceBtn" title="קול: גבר / אישה">♂</button>
      <button id="fontBtn" title="החלף כתב רש״י / מרובע">אות רש״י</button>
      <button id="themeBtn" title="החלף צבע">🎨</button>
      <button id="signInBtn" title="התחברות">👤 התחבר</button>
      <button id="callBtn" title="שיחת חברותא">📹 חברותא</button>
      <button id="fsBtn" title="מסך מלא (F11)">⛶</button>
    </div>
  </header>

  <main id="daf-wrap">
    <section id="loading" class="overlay">
      <div class="spinner"></div>
      <div class="loading-text">טוען את הדף…</div>
    </section>

    <div id="page-scroll">
      <div id="daf-stage">
        <aside id="otzar-right" class="otzar-margin"></aside>

        <div id="daf-frame" class="daf-frame">
          <div id="daf-inner" class="daf-inner">
            <div id="daf-banner" class="daf-banner">
              <span class="corner" id="corner-r"></span>
              <span class="banner-mid" id="banner-mid"></span>
              <span class="corner" id="corner-l"></span>
            </div>

            <div id="daf-grid">
              <aside class="col side" id="col-tosafot">
                <h2 class="col-title" id="tosafot-title">תוספות</h2>
                <div class="col-body ktav-rashi" id="tosafot-body"></div>
              </aside>

              <article class="col center" id="col-gemara">
                <div class="col-body" id="gemara-body"></div>
              </article>

              <aside class="col side" id="col-rashi">
                <h2 class="col-title" id="rashi-title">רש״י</h2>
                <div class="col-body ktav-rashi" id="rashi-body"></div>
              </aside>
            </div>

            <div id="daf-footer" class="daf-footer">
              <span id="footer-masechet"></span>
              <span id="footer-daf"></span>
            </div>
          </div>
        </div>

        <aside id="otzar-left" class="otzar-margin"></aside>
      </div>

      <div id="sefer-view" class="hidden">
        <div id="sefer-stage">
          <aside id="sefer-right" class="otzar-margin"></aside>

          <div class="daf-frame">
            <div class="daf-inner">
              <div class="daf-banner">
                <button class="corner navc" id="sefer-prev" title="הקודם">▶</button>
                <span class="banner-mid" id="sefer-title"></span>
                <button class="corner navc" id="sefer-next" title="הבא">◀</button>
              </div>
              <div id="sefer-main" class="col-body"></div>
              <div class="daf-footer"><span id="sefer-foot"></span></div>
            </div>
          </div>

          <aside id="sefer-left" class="otzar-margin"></aside>
        </div>
      </div>

      <section id="mefarshim-wrap" class="sections">
        <h2 class="sections-title">אוצר המפרשים</h2>
        <div id="mefarshim-sections"></div>
      </section>

      <section id="poskim-wrap" class="sections">
        <h2 class="sections-title">פוסקים — עין משפט נר מצוה</h2>
        <div id="poskim-sections"></div>
      </section>
    </div>
  </main>

  <div id="read-modal" class="modal hidden">
    <div class="modal-inner read-inner">
      <div class="modal-head">
        <span id="read-title"></span>
        <span class="read-tools">
          <button id="read-smaller" title="הקטן">א−</button>
          <button id="read-bigger" title="הגדל">א+</button>
          <button id="read-close" title="סגור">✕</button>
        </span>
      </div>
      <div class="modal-body read-body" id="read-body"></div>
    </div>
  </div>

  <div id="chavrusa-panel" class="side-panel hidden">
    <div class="panel-head">
      <span>חברותא</span>
      <button id="chavrusa-close" title="סגור">✕</button>
    </div>
    <div class="panel-body">
      <div id="chavrusa-auth"></div>
      <div class="panel-sub">לומדים מחוברים עכשיו</div>
      <div id="online-list"><div class="muted">התחבר כדי לראות מי לומד ולפתוח חברותא.</div></div>
      <button id="jitsiFallback" class="ghost-btn">פתח חדר וידאו מהיר (Jitsi)</button>
    </div>
  </div>

  <div id="incoming-call" class="hidden">
    <div class="incoming-inner">
      <div id="incoming-text"></div>
      <div class="incoming-actions">
        <button id="incoming-accept" class="accept">✓ ענה</button>
        <button id="incoming-decline" class="decline">✕ דחה</button>
      </div>
    </div>
  </div>

  <div id="call-overlay" class="hidden">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div id="call-status">מתקשר…</div>
    <div class="call-controls">
      <button id="btn-mic" title="מיקרופון">🎤</button>
      <button id="btn-cam" title="מצלמה">🎥</button>
      <button id="btn-hangup" class="hangup" title="נתק">📵 נתק</button>
    </div>
  </div>

  <div id="call-modal" class="modal hidden">
    <div class="modal-inner">
      <div class="modal-head">
        <span>שיחת חברותא — וידאו</span>
        <button id="call-close" title="סגור">✕</button>
      </div>
      <div class="modal-body">
        <div id="call-setup">
          <p>שם החדר (שני הצדדים צריכים אותו שם):</p>
          <input id="room-input" type="text" dir="ltr" />
          <button id="join-btn">הצטרף לשיחה</button>
          <p class="hint">ברירת מחדל: חדר לפי הדף הנוכחי, כך שהחברותא נפגש "על הדף".</p>
        </div>
        <div id="jitsi-container"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="data.js"></script>
  <script src="api.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="presence.js"></script>
  <script src="call.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
